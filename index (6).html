<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding fetch</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <style>
        .post{
            border: 2px dotted black;
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>My Daily Posts</h1>
        <div v-if="posts.length == 0">
            <h2>No new posts for today</h2>
        </div>
        <div v-else>
            <table>
                <thead>
                    <tr>
                        <th>Post Id</th>
                        <th>Post Title</th>
                        <th>User Id</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="post in posts" :key="post.id">
                        <td>{{ post.id }}</td>
                        <td>{{ post.title }}</td>
                        <td>{{ post.userId }}</td>
                        <td>
                            <button @click="viewPost(post.id)">view post</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="post" v-if="isClicked">
                <h2>Post Details</h2>
                <h2>{{ post.title }}</h2>
                <h3>{{ post.id }}</h3>
                <h4>{{ post.body }}</h4>
                <button @click="closePost">close</button>
            </div>
            <div>
                <button @click="createPost">Create</button>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
